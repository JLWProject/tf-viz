<!DOCTYPE html>
<!--
  Source harness for images/icon.png - NOT shipped with the extension.
  Renders the 128x128 Marketplace icon as inline SVG so Playwright can
  screenshot it at exact pixel size (no ImageMagick/rsvg-convert available
  in this environment). Regenerate after editing: screenshot the #icon
  element at a 128x128 viewport, deviceScaleFactor 4 (renders at 512x512),
  then downsize to 128x128 with `sips` for anti-aliased edges.

  Design: a bold "tf" monogram built from rounded bars (not a text glyph,
  so the shape never depends on which font happens to be installed wherever
  this gets screenshotted) on a dark rounded-square ground, with one small
  graph-node accent hanging off the f's crossbar - keeps a trace of the
  webview's own node-and-curved-edge visual language (see render.ts/
  theme.css) without the letterforms competing with a busier network
  illustration. No official Terraform/HashiCorp mark used, so no trademark
  concern.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <svg id="icon" width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="letters" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#a99bff" />
          <stop offset="1" stop-color="#5ad2e6" />
        </linearGradient>
      </defs>

      <rect x="4" y="4" width="120" height="120" rx="27" fill="#1c1730" />
      <rect x="4.5" y="4.5" width="119" height="119" rx="26.5" fill="none" stroke="#ffffff" stroke-opacity="0.10" />

      <!-- "t": stem + crossbar -->
      <g fill="url(#letters)">
        <rect x="34" y="26" width="12" height="58" rx="6" />
        <rect x="24" y="38" width="32" height="10" rx="5" />

        <!-- "f": stem + crossbar, filled bars like the t above -->
        <rect x="68" y="34" width="12" height="50" rx="6" />
        <rect x="64" y="50" width="28" height="10" rx="5" />
      </g>
      <!-- f's ascender hook drawn as a curved stroke (not a flat bar), so it
           reads as a lowercase hood rather than a capital F's flush top -->
      <path
        d="M 74 34 C 74 20, 80 16, 92 18"
        fill="none"
        stroke="url(#letters)"
        stroke-width="12"
        stroke-linecap="round"
      />

      <!-- single graph-node accent, tailing off the f's crossbar -->
      <circle cx="97" cy="94" r="8" fill="#5ad2e6" />
      <path
        d="M 92 74 C 92 84, 92 88, 97 89"
        fill="none"
        stroke="#5ad2e6"
        stroke-width="3.5"
        stroke-linecap="round"
        opacity="0.85"
      />
    </svg>
  </body>
</html>
