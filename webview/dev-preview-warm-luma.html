<!--
  Dev-only preview harness - NOT shipped with the extension, NOT part of any
  build target (see .vscodeignore's `dev-preview*.html` exclusion, which
  still matches this file). Same real webview.js/webview.css bundle and
  stubbed acquireVsCodeApi() as dev-preview.html/dev-preview-light.html, but
  differs in two ways:

    - The faked --vscode-* :root tokens below are NOT hand-picked
      approximations - they're every one of Warm Luma's real
      326 color tokens (repo-relative:
      vscode-theme/warm-luma/themes/warm-luma.json), converted
      programmatically (id.replace(/\./g, '-'), prefixed --vscode-) straight
      from its `colors` JSON object - not typed by hand, not approximated.
      Exists specifically to verify the new `--tf-accent-*` derived accent
      tokens in theme.css (see that file's top-of-file comment) actually
      pick up this real theme's real palette for node borders/gradients/
      icon badges/the module-cluster dot, instead of silently falling back
      to VS Code's generic built-in charts.blue/purple/orange the way the
      old direct var(--vscode-charts-*) references did - Warm Luma
      sets none of the charts.* tokens, same as most community themes.

    - The embedded GRAPH_MODEL below is a NEW real captured payload (not
      reused from dev-preview.html, which has no `module` kind node in it)
      - run through the actual tf-hcl-graph Go binary and then the actual
      buildGraphModel() TS function, same as dev-preview.html's own payload,
      against a two-file fixture: root
      `azurerm_resource_group` -> `module.network` (a local relative-path
      child module containing its own `azurerm_virtual_network` ->
      `azurerm_subnet`) -> `azurerm_linux_virtual_machine`, plus one
      `data.azurerm_client_config` source, two `variable`s (one plain, one
      `sensitive`), one `locals`, and two `output`s (one of them itself
      referencing the child module's own output) - deliberately a superset
      of dev-preview.html's mix specifically so resource/data/module all
      appear together in the same graph, per this change's verification
      requirements.

  Open this file directly in a browser (file:// is fine).
-->
