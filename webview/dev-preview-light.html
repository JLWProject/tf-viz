<!DOCTYPE html>
<!--
  Dev-only preview harness - NOT shipped with the extension, NOT part of any
  build target. Light-theme counterpart of dev-preview.html: identical
  GRAPH_MODEL and identical stubbed acquireVsCodeApi(), the only difference
  is the faked --vscode-* :root tokens below, picked to roughly resemble VS
  Code's default Light+ theme instead of Dark+ - exists specifically to
  confirm the "2026 sexy" redesign (drop shadows, gradient node fills, icon
  badges, module cluster panels) still looks correct/legible on a light
  background, not just a dark one, since real stakeholders may be on either.

  Open this file directly in a browser (file:// is fine).
-->
<html lang="en">

        --vscode-editor-background: #ffffff;
        --vscode-editor-foreground: #3b3b3b;
        --vscode-panel-border: #d4d4d4;
        --vscode-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

        --vscode-editor-font-family: Menlo, Consolas, monospace;

        --vscode-descriptionForeground: #717171;
        --vscode-input-background: #ffffff;
        --vscode-input-foreground: #3b3b3b;
        --vscode-input-border: #cecece;
        --vscode-input-placeholderForeground: #767676;
        --vscode-focusBorder: #0090f1;
        --vscode-checkbox-background: #ffffff;
        --vscode-checkbox-border: #919191;
        --vscode-button-background: #005fb8;
        --vscode-button-foreground: #ffffff;

        --vscode-widget-shadow: rgba(0, 0, 0, 0.16);
        --vscode-charts-blue: #1a85ff;
        --vscode-charts-green: #388a34;
        --vscode-charts-orange: #d18616;
        --vscode-charts-purple: #652d90;
        --vscode-charts-red: #cc0000;
        --vscode-errorForeground: #cc0000;
      }
    </style>
    <script>
      // Stub of the ambient global every webview gets exactly once from VS
      // Code - here it just logs everything instead of bridging to a real
      // extension host.
      window.acquireVsCodeApi = function () {
        return {
          postMessage(message) {
            console.log('[dev-preview] postMessage from webview:', message);
          },
          getState() {
            return undefined;
          },
          setState() {
            /* no-op */
          },
        };
      };
    </script>
  </head>
